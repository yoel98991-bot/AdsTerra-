name: Build Cliente APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-cliente:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Usar cliente.html como punto de entrada
        run: cp www/cliente.html www/index.html

      - name: Usar capacitor.cliente.config.json
        run: cp capacitor.cliente.config.json capacitor.config.json

      - run: npx cap add android
      
      # --- NUEVO: GENERAR ÍCONOS ---
      - name: Generar Íconos
        run: |
          npm install @capacitor/assets --save-dev
          npx @capacitor/assets generate --android
      # -----------------------------

      # Esta es la línea corregida:
      - run: cp google-services-cliente.json android/app/google-services.json

      - run: npx cap sync

      - name: Añadir permisos de Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>|g' $MANIFEST

      # --- NUEVO: FIRMA Y COMPILACIÓN DE PRODUCCIÓN ---
      - name: Decodificar Llave de Producción
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/agualight.keystore

      - name: Compilar APK Oficial Firmado (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=agualight.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}
      # ------------------------------------------------

      # --- NUEVO: SUBIDA DEL APK DE PRODUCCIÓN ---
      - uses: actions/upload-artifact@v4
        with:
          name: Aguabol-Cliente-APK
          path: android/app/build/outputs/apk/release/app-release.apk
