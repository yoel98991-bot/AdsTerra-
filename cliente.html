<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f4f6f9">
  <title>AguaBol - Pedidos</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ========== VARIABLES GLOBALES ========== */
    :root {
      --system-bg: #f4f6f9;
      --card-bg: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --tint: #0ea5e9; 
      --tint-hover: #0284c7;
      --destructive: #ef4444;
      --green: #10b981;
      --separator: #f3f4f6;
      --tab-bg: rgba(255, 255, 255, 0.9);
      
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
      --radius-sm: 14px;
      --radius-md: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      background: var(--system-bg); color: var(--text-primary);
      -webkit-font-smoothing: antialiased; min-height: 100vh;
      padding: env(safe-area-inset-top) 20px 0 20px;
      padding-bottom: calc(env(safe-area-inset-bottom) + 100px);
    }

    /* ========== ANIMACIONES ========== */
    .screen { display: none; padding-bottom: 20px; animation: fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .screen.active { display: block; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { 100% { transform: rotate(360deg); } } 
    .spin { animation: spin 1s linear infinite; }

    /* ========== TOAST NOTIFICATIONS ========== */
    .toast-container {
      position: fixed; top: calc(env(safe-area-inset-top) + 10px); left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 380px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border-radius: 100px; padding: 12px 20px; display: flex; align-items: center; gap: 12px;
      font-weight: 700; font-size: 14px; pointer-events: auto;
      animation: toastSlideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, toastFadeOut 0.4s ease 3s forwards;
    }
    .toast svg { width: 22px; height: 22px; flex-shrink: 0; }
    .toast.success svg { color: var(--green); }
    .toast.error svg { color: var(--destructive); }
    .toast.info svg { color: var(--tint); }
    @keyframes toastSlideDown { from { opacity: 0; transform: translateY(-30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastFadeOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-10px) scale(0.9); } }

    /* ========== COMPONENTES ========== */
    .nav-bar { display: flex; flex-direction: column; padding: 16px 0 24px 0; gap: 4px; }
    .nav-title { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
    .greeting { font-size: 15px; color: var(--text-secondary); font-weight: 500; }

    .card {
      background: var(--card-bg); border-radius: var(--radius-md); padding: 24px;
      margin-bottom: 20px; box-shadow: var(--shadow-sm); width: 100%; border: 1px solid rgba(255,255,255,0.8);
    }

    .input-group { margin-bottom: 18px; width: 100%; }
    .input-group label {
      font-size: 12px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 8px; display: block;
    }
    .input-row-gps { display: flex; gap: 10px; align-items: center; }
    input {
      appearance: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-sm);
      padding: 16px; font-size: 16px; font-family: inherit; color: var(--text-primary); width: 100%; font-weight: 600; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--tint); background: #ffffff; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); }

    /* ========== BOTONES ========== */
    .btn-primary {
      background: linear-gradient(135deg, var(--tint), #0284c7); color: white; border: none;
      border-radius: var(--radius-sm); padding: 18px; font-weight: 700; font-size: 17px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
      box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3); transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(14, 165, 233, 0.2); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .btn-gps {
      background: #e0f2fe; color: var(--tint); border: none; border-radius: var(--radius-sm);
      width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      cursor: pointer; transition: 0.2s;
    }
    .btn-gps:active { background: #bae6fd; transform: scale(0.92); }

    /* ========== BADGES ========== */
    .badge-status {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 8px;
      font-size: 11px; font-weight: 700; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-status.waiting { background: #fef3c7; color: #b45309; }
    .badge-status.success { background: #dcfce7; color: #16a34a; }
    .badge-status.error { background: #fee2e2; color: #b91c1c; }

    /* ========== LEALTAD (CLUB AGUABOL) ========== */
    .loyalty-card {
      background: linear-gradient(135deg, #111827, #1f2937); border-radius: var(--radius-md); padding: 22px;
      margin-bottom: 24px; box-shadow: var(--shadow-md); color: white; position: relative; overflow: hidden;
    }
    .loyalty-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: relative; z-index: 2; }
    .loyalty-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .loyalty-counter { font-size: 14px; font-weight: 700; color: var(--tint); background: rgba(14, 165, 233, 0.15); padding: 4px 10px; border-radius: 10px; }
    
    .progress-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden; position: relative; z-index: 2; }
    .progress-fill { background: linear-gradient(90deg, #38bdf8, var(--tint)); height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); width: 0%; }
    
    .loyalty-hint { font-size: 13px; color: #9ca3af; margin-top: 14px; font-weight: 500; position: relative; z-index: 2; line-height: 1.4; }
    .loyalty-icon-bg { position: absolute; right: -15px; bottom: -20px; color: rgba(255,255,255,0.03); z-index: 1; transform: rotate(-15deg); }

    /* ========== PRODUCTOS (PEDIDO) ========== */
    .product-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0; border-bottom: 1px solid var(--separator);
    }
    .product-row:last-child { border-bottom: none; }
    .product-info { flex: 1; }
    .product-name { font-size: 17px; font-weight: 800; color: var(--text-primary); }
    .product-price { font-size: 14px; color: var(--tint); font-weight: 700; margin-top: 4px; }
    
    .qty-control { display: flex; align-items: center; gap: 14px; background: #f8fafc; padding: 6px; border-radius: 100px; border: 1px solid #e2e8f0; }
    .qty-btn {
      width: 36px; height: 36px; border-radius: 18px; background: white; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      font-size: 20px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;
    }
    .qty-btn:active { background: #f1f5f9; transform: scale(0.9); }
    .qty-value { font-size: 18px; font-weight: 800; min-width: 24px; text-align: center; }

    .total-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 8px; }
    .total-label { font-size: 14px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;}
    .total-amount { font-size: 34px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; }

    /* ========== TABS ========== */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-around; align-items: center;
      height: calc(env(safe-area-inset-bottom) + 70px); padding-bottom: env(safe-area-inset-bottom); z-index: 150;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 11px; font-weight: 700; gap: 6px; padding: 12px 0; transition: color 0.3s; cursor: pointer;
    }
    .tab-item.active { color: var(--tint); }
  </style>
</head>
<body>

  <div id="toast-container" class="toast-container"></div>

  <div id="screen-perfil" class="screen">
    <div class="nav-bar">
      <span class="nav-title">Bienvenido</span>
      <span class="greeting">Completa tus datos de entrega para empezar a pedir.</span>
    </div>
    
    <div class="card">
      <div class="input-group">
        <label>Nombre y Apellido</label>
        <input type="text" id="perfil-nombre" placeholder="Ej. Carlos Pérez">
      </div>
      <div class="input-group">
        <label>Teléfono (WhatsApp)</label>
        <input type="tel" id="perfil-telefono" placeholder="0412 1234567">
      </div>
      
      <div class="input-group" style="margin-bottom: 0;">
        <label>Dirección exacta</label>
        <div class="input-row-gps">
          <input type="text" id="perfil-direccion" placeholder="Ej. Calle 123, Edificio Sol, Apto 4" style="flex: 1;">
          <button class="btn-gps" onclick="fijarGPS()" title="Fijar mi ubicación GPS">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 21c4-4 8-9 8-13a8 8 0 1 0-16 0c0 4 4 9 8 13z"/></svg>
          </button>
        </div>
        <div id="gps-status" class="badge-status" style="display: none;"></div>
      </div>
    </div>
    
    <button class="btn-primary" id="btn-guardar-perfil" onclick="guardarPerfil()">
      Guardar y Continuar
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>


  <div id="screen-pedido" class="screen">
    <div class="nav-bar">
      <span class="nav-title">Hacer Pedido</span>
      <span class="greeting" id="display-greeting">Hola, Cliente</span>
    </div>

    <div class="loyalty-card" id="loyalty-card" style="display: none;">
      <svg class="loyalty-icon-bg" width="120" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
      <div class="loyalty-header">
        <div class="loyalty-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--tint)" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
          Club AguaBol
        </div>
        <div class="loyalty-counter" id="loyalty-text">0/10 recargas</div>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="loyalty-fill"></div>
      </div>
      <div class="loyalty-hint" id="loyalty-hint">Cargando progreso...</div>
    </div>

    <div class="total-container">
      <span class="total-label">Total a Pagar</span>
      <strong class="total-amount" id="total-pedido">Bs 0.00</strong>
    </div>

    <div class="card" style="padding: 10px 24px;">
      <div class="product-row">
        <div class="product-info">
          <div class="product-name">Agua Mineral</div>
          <div class="product-price" id="precio-mineral-label">Cargando...</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="cambiarCant('mineral', -1)">-</button>
          <span class="qty-value" id="cant-mineral">0</span>
          <button class="qty-btn" onclick="cambiarCant('mineral', 1)">+</button>
        </div>
      </div>

      <div class="product-row">
        <div class="product-info">
          <div class="product-name">Agua Saborizada</div>
          <div class="product-price" id="precio-saborizada-label">Cargando...</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="cambiarCant('saborizada', -1)">-</button>
          <span class="qty-value" id="cant-saborizada">0</span>
          <button class="qty-btn" onclick="cambiarCant('saborizada', 1)">+</button>
        </div>
      </div>

      <div class="product-row" style="background: #f8fafc; margin: 0 -24px -10px -24px; padding: 18px 24px; border-radius: 0 0 var(--radius-md) var(--radius-md);">
        <div class="product-info">
          <div class="product-name" style="font-size: 15px; color: var(--text-secondary);">Entregaré envases vacíos</div>
        </div>
        <div class="qty-control" style="background: white;">
          <button class="qty-btn" onclick="cambiarCant('envases', -1)">-</button>
          <span class="qty-value" id="cant-envases">0</span>
          <button class="qty-btn" onclick="cambiarCant('envases', 1)">+</button>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btn-enviar-pedido" onclick="enviarPedido()">
      Confirmar Pedido
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>


  <div class="tab-bar" id="bottom-tabs" style="display: none;">
    <div class="tab-item active" data-screen="pedido" onclick="switchTab('pedido')">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Pedir</span>
    </div>
    <div class="tab-item" data-screen="perfil" onclick="switchTab('perfil')">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Mi Info</span>
    </div>
  </div>

  <script>
    // ========== CONFIGURACIÓN SUPABASE ==========
    const SUPABASE_URL = 'https://aiipxfssbnpfpefbbnwm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpaXB4ZnNzYm5wZnBlZmJibndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDM2MzIsImV4cCI6MjA5NDI3OTYzMn0.CS_e43iE4ClLgqQULrm4mNm3ji71WQZQcdBNfg6lTHg';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ========== ESTADOS GLOBALES ==========
    let clienteDatos = null;
    let gpsCoords = null;
    let precios = { mineral: 0, saborizada: 0 };
    let pedidoActual = { mineral: 0, saborizada: 0, envases: 0 };
    let progresoLealtad = { faltan: 10, esGratis: false };

    // ========== SISTEMA TOAST ==========
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      let iconSvg = type === 'success' 
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
        : type === 'error'
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
      
      toast.innerHTML = `${iconSvg} <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    function formatearBs(monto) { return 'Bs ' + parseFloat(monto).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

    // ========== NAVEGACIÓN ==========
    function switchTab(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + screenId).classList.add('active');
      document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.screen === screenId));
    }

    // ========== GEOLOCALIZACIÓN (GPS & REVERSE GEOCODING) ==========
    function fijarGPS() {
      const status = document.getElementById('gps-status');
      const inputDireccion = document.getElementById('perfil-direccion');
      
      status.style.display = 'inline-flex';
      status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Obteniendo GPS...';
      status.className = 'badge-status waiting';
      
      if (!navigator.geolocation) {
        status.innerHTML = 'GPS no soportado en tu navegador';
        status.className = 'badge-status error';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Ubicación fijada';
          status.className = 'badge-status success';
          
          // Magia: Convertir Coordenadas a Texto (Geocodificación Inversa Gratuita)
          try {
            status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Leyendo mapa...';
            
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${gpsCoords.lat}&lon=${gpsCoords.lng}`);
            const data = await response.json();
            
            if (data && data.display_name) {
              // Limpiamos un poco la dirección (quitando el país para que no sea tan larga)
              let dirLimpia = data.display_name.split(',').slice(0, -1).join(',');
              
              // Si el campo estaba vacío, lo rellenamos. Si ya tenía texto, lo sobrescribimos o agregamos.
              if(inputDireccion.value.trim() === '') {
                 inputDireccion.value = dirLimpia.trim() + ' (Detalla tu casa/apto aquí)';
              }
              
              status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Dirección detectada';
              showToast('Dirección aproximada encontrada', 'success');
            }
          } catch (e) {
            console.error("Error leyendo mapa:", e);
            status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Ubicación fijada';
            showToast('Ubicación fijada. Escribe tu calle manualmente.', 'info');
          }
        },
        (err) => {
          console.error("GPS Error:", err);
          status.innerHTML = 'Activa el GPS en tu teléfono';
          status.className = 'badge-status error';
          showToast('No se pudo obtener la ubicación', 'error');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // ========== LÓGICA DE PERFIL (LOCALSTORAGE & SUPABASE) ==========
    async function verificarPerfil() {
      const guardado = localStorage.getItem('aguabol_cliente');
      if (guardado) {
        clienteDatos = JSON.parse(guardado);
        gpsCoords = clienteDatos.coords || null;
        
        // Rellenar formulario
        document.getElementById('perfil-nombre').value = clienteDatos.nombre;
        document.getElementById('perfil-telefono').value = clienteDatos.telefono;
        document.getElementById('perfil-direccion').value = clienteDatos.direccion;
        if(gpsCoords) {
           const status = document.getElementById('gps-status');
           status.style.display = 'inline-flex';
           status.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Ubicación fijada (Guardada)';
           status.className = 'badge-status success';
        }
        
        document.getElementById('display-greeting').textContent = `Hola, ${clienteDatos.nombre.split(' ')[0]}`;
        document.getElementById('bottom-tabs').style.display = 'flex';
        
        cargarPrecios();
        cargarLealtad();
        switchTab('pedido');
      } else {
        document.getElementById('bottom-tabs').style.display = 'none';
        switchTab('perfil');
      }
    }

    async function guardarPerfil() {
      const nombre = document.getElementById('perfil-nombre').value.trim();
      const telefono = document.getElementById('perfil-telefono').value.trim();
      const direccion = document.getElementById('perfil-direccion').value.trim();

      if (!nombre || !telefono || !direccion) {
        return showToast('Por favor, completa todos los campos', 'error');
      }

      const btn = document.getElementById('btn-guardar-perfil');
      btn.innerHTML = 'Guardando...';
      btn.disabled = true;

      try {
        // Buscar si el cliente ya existe en Supabase por el teléfono
        const { data: existCli, error: searchErr } = await db.from('clientes').select('id').eq('telefono', telefono);
        
        let clientId;
        let direccionConCoords = direccion;

        // Formato limpio para las coordenadas (Sin Google Links largos)
        if (gpsCoords && !direccion.includes('GPS:')) {
           direccionConCoords = `${direccion} | GPS: ${gpsCoords.lat},${gpsCoords.lng}`;
        }

        if (existCli && existCli.length > 0) {
           // Actualizar cliente existente
           clientId = existCli[0].id;
           await db.from('clientes').update({ nombre, direccion: direccionConCoords }).eq('id', clientId);
        } else {
           // Crear nuevo cliente
           clientId = crypto.randomUUID();
           await db.from('clientes').insert({ id: clientId, nombre, telefono, direccion: direccionConCoords });
        }

        clienteDatos = { id: clientId, nombre, telefono, direccion, coords: gpsCoords };
        localStorage.setItem('aguabol_cliente', JSON.stringify(clienteDatos));
        
        showToast('Datos sincronizados correctamente', 'success');
        verificarPerfil(); 

      } catch (err) {
        console.error("Error guardando perfil:", err);
        showToast('Error de conexión', 'error');
      } finally {
        btn.innerHTML = `Guardar y Continuar <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
        btn.disabled = false;
      }
    }

    // ========== CLUB AGUABOL (LEALTAD) ==========
    async function cargarLealtad() {
      if (!clienteDatos || !clienteDatos.id) return;
      
      document.getElementById('loyalty-card').style.display = 'block';

      try {
        // Leemos todas las compras confirmadas (tabla ventas) de este cliente
        const { data: ventasCli } = await db.from('ventas').select('mineral, saborizada').eq('cliente_id', clienteDatos.id);
        
        let totalBotellonesComprados = 0;
        if (ventasCli) {
           ventasCli.forEach(v => {
              totalBotellonesComprados += (v.mineral + v.saborizada);
           });
        }

        const META = 10;
        const progreso = totalBotellonesComprados % META;
        progresoLealtad.faltan = META - progreso;
        
        document.getElementById('loyalty-text').textContent = `${progreso}/${META} recargas`;
        document.getElementById('loyalty-fill').style.width = `${(progreso / META) * 100}%`;

        const hint = document.getElementById('loyalty-hint');
        if (progreso === 0 && totalBotellonesComprados > 0) {
           hint.innerHTML = '<strong style="color:var(--green)">¡Felicidades!</strong> Tu próxima recarga es GRATIS. Pídela hoy. 🎉';
           progresoLealtad.esGratis = true;
        } else {
           hint.textContent = `Pide ${progresoLealtad.faltan} recargas más para llevarte 1 botellón GRATIS.`;
           progresoLealtad.esGratis = false;
        }

      } catch (err) {
        console.error("Error lealtad:", err);
        document.getElementById('loyalty-card').style.display = 'none';
      }
    }

    // ========== PRECIOS Y PEDIDOS ==========
    async function cargarPrecios() {
      try {
        const { data } = await db.from('configuracion').select('precio_mineral, precio_saborizada').eq('id', 1).single();
        if (data) {
          precios.mineral = parseFloat(data.precio_mineral);
          precios.saborizada = parseFloat(data.precio_saborizada);
          document.getElementById('precio-mineral-label').textContent = formatearBs(precios.mineral);
          document.getElementById('precio-saborizada-label').textContent = formatearBs(precios.saborizada);
        }
      } catch (error) {
        console.error("Error precios:", error);
      }
    }

    function cambiarCant(producto, delta) {
      pedidoActual[producto] = Math.max(0, pedidoActual[producto] + delta);
      document.getElementById(`cant-${producto}`).textContent = pedidoActual[producto];
      calcularTotal();
    }

    function calcularTotal() {
      let total = (pedidoActual.mineral * precios.mineral) + (pedidoActual.saborizada * precios.saborizada);
      
      // Si tiene una recarga gratis, le notificamos que el desc. se aplicará en la confirmación
      if (progresoLealtad.esGratis && (pedidoActual.mineral > 0 || pedidoActual.saborizada > 0)) {
         document.getElementById('total-pedido').innerHTML = `${formatearBs(total)} <span style="display:block; font-size:11px; color:var(--green); font-weight:600; margin-top:4px;">¡Descuento se aplicará al entregar!</span>`;
      } else {
         document.getElementById('total-pedido').textContent = formatearBs(total);
      }
      return total;
    }

    async function enviarPedido() {
      if (pedidoActual.mineral === 0 && pedidoActual.saborizada === 0) {
        return showToast('Agrega al menos un producto a tu pedido', 'error');
      }

      const total = (pedidoActual.mineral * precios.mineral) + (pedidoActual.saborizada * precios.saborizada);
      const btn = document.getElementById('btn-enviar-pedido');
      btn.innerHTML = 'Enviando Pedido...';
      btn.disabled = true;

      const idPedido = crypto.randomUUID();
      
      // Formato limpio para las coordenadas en el pedido (Sin Google Links largos)
      let dirFinal = clienteDatos.direccion;
      if (gpsCoords && !dirFinal.includes('GPS:')) {
         dirFinal = `${clienteDatos.direccion} | GPS: ${gpsCoords.lat},${gpsCoords.lng}`;
      }

      try {
        const { error } = await db.from('pedidos').insert({
          id: idPedido,
          cliente_id: clienteDatos.id,
          nombre_cliente: clienteDatos.nombre,
          telefono_cliente: clienteDatos.telefono,
          direccion_entrega: dirFinal,
          mineral: pedidoActual.mineral,
          saborizada: pedidoActual.saborizada,
          envases_a_devolver: pedidoActual.envases,
          total: total
        });

        if (error) throw error;

        showToast('¡Pedido enviado con éxito!', 'success');
        
        // Resetear visual
        pedidoActual = { mineral: 0, saborizada: 0, envases: 0 };
        document.getElementById('cant-mineral').textContent = '0';
        document.getElementById('cant-saborizada').textContent = '0';
        document.getElementById('cant-envases').textContent = '0';
        calcularTotal();

      } catch (error) {
        console.error("Error enviando pedido:", error);
        showToast('Error al enviar. Intenta de nuevo.', 'error');
      } finally {
        btn.innerHTML = `Confirmar Pedido <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>`;
        btn.disabled = false;
      }
    }

    // ========== INICIAR APP ==========
    document.addEventListener('DOMContentLoaded', () => {
      verificarPerfil();
    });

  </script>
</body>
</html>
