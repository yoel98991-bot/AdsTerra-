<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f4f6f9">
  <title>Agua 20L</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ========== VARIABLES GLOBALES ========== */
    :root {
      --system-bg: #f4f6f9;
      --card-bg: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --tint: #0ea5e9; 
      --tint-hover: #0284c7;
      --destructive: #ef4444;
      --green: #10b981;
      --warning: #f59e0b;
      --separator: #f3f4f6;
      --tab-bg: rgba(255, 255, 255, 0.85);
      
      --shadow-sm: 0 2px 4px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 20px -3px rgba(0,0,0,0.05);
      --shadow-float: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
      
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif;
      background: var(--system-bg); color: var(--text-primary);
      -webkit-font-smoothing: antialiased; min-height: 100vh;
      padding: env(safe-area-inset-top) 20px 0 20px;
      padding-bottom: calc(env(safe-area-inset-bottom) + 100px);
      position: relative; user-select: none;
    }

    /* ========== ANIMACIONES GLOBALES ========== */
    .screen { display: none; padding-bottom: 20px; animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .screen.active { display: block; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* ========== TOAST NOTIFICATIONS ========== */
    .toast-container {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      width: 90%;
      max-width: 380px;
    }
    .toast {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border-radius: 100px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 14px;
      pointer-events: auto;
      animation: toastSlideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, toastFadeOut 0.4s ease 2.5s forwards;
    }
    .toast svg { width: 22px; height: 22px; flex-shrink: 0; }
    .toast.success svg { color: var(--green); }
    .toast.error svg { color: var(--destructive); }
    .toast.info svg { color: var(--tint); }
    
    @keyframes toastSlideDown {
      from { opacity: 0; transform: translateY(-30px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastFadeOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-10px) scale(0.9); }
    }

    /* ========== ENCABEZADO Y TARJETAS ========== */
    .nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 24px 0; }
    .nav-title { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; color: var(--text-primary); }

    .card {
      background: var(--card-bg); border-radius: var(--radius-md); padding: 22px;
      margin-bottom: 24px; box-shadow: var(--shadow-sm); border: 1px solid rgba(255,255,255,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease; width: 100%; overflow: hidden;
    }
    .section-title {
      font-size: 18px; font-weight: 700; margin: 0 0 12px 4px; color: var(--text-primary);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ========== FORMULARIOS & SELECTORES ========== */
    .date-picker-row, .input-row { display: flex; gap: 12px; align-items: flex-end; width: 100%; }
    .picker-group, .input-group { flex: 1; min-width: 0; width: 100%; margin-bottom: 12px; }
    .picker-group label, .input-group label {
      font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 6px; display: block;
    }
    select, input {
      appearance: none; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: var(--radius-sm);
      padding: 12px 14px; font-size: 16px; font-family: inherit; color: var(--text-primary);
      width: 100%; font-weight: 600; outline: none; transition: all 0.2s ease;
    }
    select:focus, input:focus { border-color: var(--tint); background: #ffffff; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
    
    /* ========== BOTONES ========== */
    .btn-primary {
      background: linear-gradient(135deg, var(--tint), #0284c7); color: white; border: none;
      border-radius: var(--radius-sm); padding: 12px 20px; font-weight: 600; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
    }
    .btn-small {
      padding: 6px 12px; font-size: 13px; background: #e0f2fe; color: var(--tint-hover);
      border-radius: 8px; border: none; font-weight: 700; cursor: pointer;
    }

    /* ========== TOTALES Y GRÁFICOS ========== */
    .total-card {
      background: linear-gradient(135deg, var(--text-primary), #1f2937); border-radius: var(--radius-md);
      padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 12px; color: white;
    }
    .total-info { display: flex; flex-direction: column; }
    .total-label { font-size: 13px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
    .total-amount { font-size: 32px; font-weight: 800; color: white; letter-spacing: -0.5px;}
    .utilidad-amount { font-size: 18px; font-weight: 700; color: var(--green); }

    /* ========== INVENTARIO & CLIENTES ========== */
    .stock-item { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--separator); gap: 12px; }
    .stock-name { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .stock-qty { font-size: 20px; font-weight: 800; min-width: 36px; text-align: center; }
    
    .client-list { background: var(--card-bg); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; margin-top: 10px; }
    .client-row { display: flex; flex-direction: column; padding: 16px; border-bottom: 1px solid var(--separator); cursor: pointer; }
    .client-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }

    /* ========== MODALES & PESTAÑAS ========== */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 200; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-sheet {
      background: var(--card-bg); width: 100%; max-width: 500px; border-radius: 28px 28px 0 0;
      padding: 24px 24px calc(env(safe-area-inset-bottom) + 30px);
      transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 80vh; overflow-y: auto; 
    }
    .modal-overlay.active .modal-sheet { transform: translateY(0); }
    .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 24px; text-align: center; }
    
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bg); backdrop-filter: blur(20px); 
      border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-around; align-items: center; 
      height: calc(env(safe-area-inset-bottom) + 70px); padding-bottom: env(safe-area-inset-bottom); z-index: 150;
    }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; font-weight: 600; gap: 6px; padding: 10px 0; cursor: pointer; }
    .tab-item.active { color: var(--tint); }
  </style>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div id="screen-inicio" class="screen active">
    <div class="nav-bar"><span class="nav-title">Inicio</span></div>
    
    <div class="total-card">
      <div class="total-info">
        <span class="total-label">Ingresos Totales</span>
        <span class="total-amount" id="total-mes">Bs 0.00</span>
      </div>
      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; display: flex; justify-content: space-between; align-items: center;">
        <div class="total-info">
          <span class="total-label" style="color:#d1d5db;">Utilidad Neta</span>
          <span class="utilidad-amount" id="utilidad-neta">Bs 0.00</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Registrar Venta</div>
      <div class="input-group">
        <label>Fecha</label>
        <input type="date" id="fecha-venta">
      </div>
      <div class="input-group">
        <label>Cliente</label>
        <select id="cliente-venta"></select>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>Mineral</label>
          <input type="number" id="qty-mineral" value="0" min="0">
        </div>
        <div class="input-group">
          <label>Saborizada</label>
          <input type="number" id="qty-saborizada" value="0" min="0">
        </div>
        <div class="input-group">
          <label>Envases Devueltos</label>
          <input type="number" id="qty-devueltos" value="0" min="0">
        </div>
      </div>
      <button class="btn-primary" onclick="registrarVenta()" style="margin-top: 10px;">Guardar Venta</button>
    </div>
  </div>

  <div id="screen-inventario" class="screen">
    <div class="nav-bar"><span class="nav-title">Inventario</span></div>
    <div class="card">
      <div class="stock-item">
        <div class="stock-name">Agua Mineral</div>
        <div class="stock-qty" id="stock-mineral">0</div>
      </div>
      <div class="stock-item">
        <div class="stock-name">Agua Saborizada</div>
        <div class="stock-qty" id="stock-saborizada">0</div>
      </div>
      <div class="stock-item">
        <div class="stock-name">Envases Vacíos</div>
        <div class="stock-qty" id="stock-vacios">0</div>
      </div>
      <button class="btn-primary" onclick="abrirModalStock()" style="margin-top: 16px;">Actualizar Stock Manual</button>
    </div>
  </div>

  <div id="screen-clientes" class="screen">
    <div class="nav-bar"><span class="nav-title">Directorio CRM</span></div>
    <button class="btn-primary" onclick="abrirModalCliente()">+ Nuevo Cliente</button>
    <div class="client-list" id="lista-clientes">
      </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('inicio', this)">Inicio</div>
    <div class="tab-item" onclick="switchTab('inventario', this)">Inventario</div>
    <div class="tab-item" onclick="switchTab('clientes', this)">Clientes</div>
  </div>

  <div id="modalCliente" class="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-title">Cliente</div>
      <input type="hidden" id="cli-id">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" id="cli-nombre">
      </div>
      <div class="input-group">
        <label>Teléfono</label>
        <input type="text" id="cli-telefono">
      </div>
      <div class="input-group">
        <label>Dirección</label>
        <input type="text" id="cli-direccion">
      </div>
      <div class="input-group">
        <label>Frecuencia de Compra (Días)</label>
        <input type="number" id="cli-frecuencia" value="7">
      </div>
      <button class="btn-primary" onclick="guardarCliente()">Guardar Cliente</button>
      <button class="btn-primary" onclick="cerrarModal('modalCliente')" style="background: var(--text-secondary); margin-top:10px;">Cancelar</button>
    </div>
  </div>

  <script>
    // ========== CONFIGURACIÓN SUPABASE ==========
    const SUPABASE_URL = 'https://aiipxfssbnpfpefbbnwm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpaXB4ZnNzYm5wZnBlZmJibndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDM2MzIsImV4cCI6MjA5NDI3OTYzMn0.CS_e43iE4ClLgqQULrm4mNm3ji71WQZQcdBNfg6lTHg';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Variables Globales de Estado
    let configPrecios = { precio_mineral: 8.5, precio_saborizada: 10.0, costo_mineral: 4.0, costo_saborizada: 5.0 };
    let clientes = [];
    let stock = { mineral: 0, saborizada: 0, envases_vacios: 0 };

    // ========== FUNCIONES DE UTILIDAD ==========
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg> <span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function switchTab(tabId, el) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.getElementById(`screen-${tabId}`).classList.add('active');
      el.classList.add('active');
      
      if(tabId === 'inicio') cargarDashboard();
      if(tabId === 'inventario') cargarStock();
      if(tabId === 'clientes') cargarClientes();
    }

    function abrirModalCliente(id = null) {
      document.getElementById('modalCliente').classList.add('active');
      if(id) {
        const c = clientes.find(x => x.id === id);
        document.getElementById('cli-id').value = c.id;
        document.getElementById('cli-nombre').value = c.nombre;
        document.getElementById('cli-telefono').value = c.telefono;
        document.getElementById('cli-direccion').value = c.direccion || '';
        document.getElementById('cli-frecuencia').value = c.frecuencia_dias || 7;
      } else {
        document.getElementById('cli-id').value = '';
        document.getElementById('cli-nombre').value = '';
        document.getElementById('cli-telefono').value = '';
        document.getElementById('cli-direccion').value = '';
        document.getElementById('cli-frecuencia').value = 7;
      }
    }

    function cerrarModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    // ========== SUPABASE FETCH & CRUD ==========
    
    async function cargarConfiguracion() {
      const { data, error } = await supabase.from('configuracion').select('*').eq('id', 1).single();
      if (data) configPrecios = data;
    }

    async function cargarStock() {
      const { data, error } = await supabase.from('stock').select('*').eq('id', 1).single();
      if (data) {
        stock = data;
        document.getElementById('stock-mineral').innerText = stock.mineral;
        document.getElementById('stock-saborizada').innerText = stock.saborizada;
        document.getElementById('stock-vacios').innerText = stock.envases_vacios;
      }
    }

    async function cargarClientes() {
      const { data, error } = await supabase.from('clientes').select('*').order('nombre', { ascending: true });
      if (data) {
        clientes = data;
        
        // Llenar Select de Ventas
        const select = document.getElementById('cliente-venta');
        select.innerHTML = '<option value="">Seleccione un cliente...</option>';
        data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);

        // Llenar Directorio CRM
        const list = document.getElementById('lista-clientes');
        list.innerHTML = '';
        data.forEach(c => {
          list.innerHTML += `
            <div class="client-row" onclick="abrirModalCliente('${c.id}')">
              <div class="client-name">${c.nombre}</div>
              <div style="font-size: 12px; color: var(--text-secondary);">${c.telefono} • Frecuencia: ${c.frecuencia_dias} días</div>
            </div>`;
        });
      }
    }

    async function cargarDashboard() {
      // Calcular ingresos y utilidad total
      const { data: ventas, error: errVentas } = await supabase.from('ventas').select('*');
      const { data: gastos, error: errGastos } = await supabase.from('gastos').select('*');
      
      let totalIngresos = 0;
      let costosTotales = 0;

      if (ventas) {
        ventas.forEach(v => {
          totalIngresos += Number(v.total);
          costosTotales += (v.mineral * configPrecios.costo_mineral) + (v.saborizada * configPrecios.costo_saborizada);
        });
      }

      let totalGastos = 0;
      if (gastos) gastos.forEach(g => totalGastos += Number(g.monto));

      let utilidadNeta = totalIngresos - costosTotales - totalGastos;

      document.getElementById('total-mes').innerText = `Bs ${totalIngresos.toFixed(2)}`;
      document.getElementById('utilidad-neta').innerText = `Bs ${utilidadNeta.toFixed(2)}`;
    }

    // ========== ACCIONES (WRITES) ==========

    async function guardarCliente() {
      const id = document.getElementById('cli-id').value;
      const nombre = document.getElementById('cli-nombre').value;
      const telefono = document.getElementById('cli-telefono').value;
      const direccion = document.getElementById('cli-direccion').value;
      const frecuencia_dias = parseInt(document.getElementById('cli-frecuencia').value) || 7;

      if (!nombre || !telefono) return showToast('Nombre y teléfono requeridos', 'error');

      const payload = { nombre, telefono, direccion, frecuencia_dias };

      let error;
      if (id) {
        const { error: updateErr } = await supabase.from('clientes').update(payload).eq('id', id);
        error = updateErr;
      } else {
        payload.id = crypto.randomUUID(); // Generar ID único
        const { error: insertErr } = await supabase.from('clientes').insert([payload]);
        error = insertErr;
      }

      if (error) {
        showToast('Error al guardar', 'error');
        console.error(error);
      } else {
        showToast('Cliente guardado', 'success');
        cerrarModal('modalCliente');
        cargarClientes();
      }
    }

    async function registrarVenta() {
      const fecha = document.getElementById('fecha-venta').value;
      const cliente_id = document.getElementById('cliente-venta').value;
      const mineral = parseInt(document.getElementById('qty-mineral').value) || 0;
      const saborizada = parseInt(document.getElementById('qty-saborizada').value) || 0;
      const envases_devueltos = parseInt(document.getElementById('qty-devueltos').value) || 0;

      if (!cliente_id || (mineral === 0 && saborizada === 0)) {
        return showToast('Complete cliente y cantidades', 'error');
      }

      // Validar Stock
      if (mineral > stock.mineral || saborizada > stock.saborizada) {
        return showToast('Stock insuficiente', 'error');
      }

      // Calcular Total
      const total = (mineral * configPrecios.precio_mineral) + (saborizada * configPrecios.precio_saborizada);

      // 1. Insertar Venta
      const { error: errVenta } = await supabase.from('ventas').insert([{
        id: crypto.randomUUID(),
        fecha, cliente_id, mineral, saborizada, envases_devueltos, total
      }]);

      if (errVenta) {
        console.error(errVenta);
        return showToast('Error al registrar venta', 'error');
      }

      // 2. Actualizar Stock
      const { error: errStock } = await supabase.from('stock').update({
        mineral: stock.mineral - mineral,
        saborizada: stock.saborizada - saborizada,
        envases_vacios: stock.envases_vacios + envases_devueltos
      }).eq('id', 1);

      showToast('Venta registrada exitosamente', 'success');
      
      // Resetear Formulario
      document.getElementById('qty-mineral').value = 0;
      document.getElementById('qty-saborizada').value = 0;
      document.getElementById('qty-devueltos').value = 0;
      
      cargarStock();
      cargarDashboard();
    }

    // ========== INICIALIZACIÓN ==========
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('fecha-venta').value = new Date().toISOString().split('T')[0];
      
      showToast('Conectando a Supabase...', 'info');
      
      // Cargar dependencias iniciales
      await cargarConfiguracion();
      await cargarStock();
      await cargarClientes();
      await cargarDashboard();
    });
  </script>
</body>
</html>
